<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login – Maila Dai Ko Mitho Biriyani</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--dark);
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 30% 50%, rgba(212,160,23,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 20%, rgba(212,160,23,0.05) 0%, transparent 50%);
    pointer-events: none;
  }

  .auth-container {
    width: 100%;
    max-width: 460px;
    position: relative;
    z-index: 1;
    animation: fadeUp 0.7s ease both;
  }

  .auth-logo {
    text-align: center;
    margin-bottom: 32px;
  }

  .auth-logo-icon {
    font-size: 3rem;
    display: block;
    margin-bottom: 8px;
    filter: drop-shadow(0 0 14px rgba(212,160,23,0.6));
  }

  .auth-logo-name {
    font-family: var(--font-display);
    font-size: 1.3rem;
    color: var(--gold);
    font-weight: 900;
  }

  .auth-box {
    background: var(--dark3);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 44px 40px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.7), 0 0 40px rgba(212,160,23,0.05);
  }

  .auth-title {
    font-family: var(--font-display);
    font-size: 2rem;
    font-weight: 900;
    color: var(--text);
    margin-bottom: 6px;
  }

  .auth-subtitle {
    color: var(--text-muted);
    font-size: 0.9rem;
    margin-bottom: 32px;
  }

  .auth-subtitle span {
    color: var(--gold);
    font-weight: 600;
  }

  .input-group {
    margin-bottom: 18px;
    position: relative;
  }

  .input-label {
    display: block;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }

  .input-wrap {
    position: relative;
  }

  .input-wrap i {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 0.95rem;
    pointer-events: none;
    transition: 0.3s;
  }

  .input-wrap input {
    width: 100%;
    padding: 13px 44px 13px 44px;
    background: var(--dark4);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 0.95rem;
    outline: none;
    transition: 0.3s;
  }

  .input-wrap input::placeholder { color: rgba(168,152,128,0.5); }

  .input-wrap input:focus {
    border-color: var(--gold);
    background: var(--dark);
    box-shadow: 0 0 0 3px rgba(212,160,23,0.1);
  }

  .input-wrap input:focus + i,
  .input-wrap:focus-within i { color: var(--gold); }

  .input-wrap i:last-child {
    left: auto;
    right: 16px;
    cursor: pointer;
    pointer-events: all;
  }

  .input-error {
    font-size: 0.8rem;
    color: #E74C3C;
    margin-top: 6px;
    display: none;
  }

  .input-error.show { display: block; }

  .forgot-link {
    text-align: right;
    margin-top: -10px;
    margin-bottom: 24px;
  }

  .forgot-link a {
    color: var(--text-muted);
    font-size: 0.85rem;
    transition: 0.3s;
  }

  .forgot-link a:hover { color: var(--gold); }

  .auth-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    border: none;
    border-radius: 10px;
    color: var(--dark);
    font-family: var(--font-body);
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: 0.35s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 20px;
  }

  .auth-btn:hover {
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(212,160,23,0.35);
  }

  .auth-btn:active { transform: translateY(0); }

  .divider {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 20px;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .divider span {
    font-size: 0.8rem;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .google-btn {
    width: 100%;
    padding: 13px;
    background: var(--dark4);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 24px;
  }

  .google-btn:hover {
    border-color: var(--gold);
    background: var(--dark3);
    transform: translateY(-2px);
  }

  .auth-switch {
    text-align: center;
    color: var(--text-muted);
    font-size: 0.9rem;
  }

  .auth-switch a {
    color: var(--gold);
    font-weight: 700;
    transition: 0.3s;
  }

  .auth-switch a:hover { color: var(--gold-light); text-decoration: underline; }

  .back-home {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-top: 24px;
    color: var(--text-muted);
    font-size: 0.88rem;
    transition: 0.3s;
  }

  .back-home:hover { color: var(--gold); }

  /* Success/Error Toast */
  .auth-message {
    padding: 14px 18px;
    border-radius: 10px;
    font-size: 0.9rem;
    font-weight: 600;
    margin-bottom: 20px;
    display: none;
    align-items: center;
    gap: 10px;
  }

  .auth-message.success {
    background: rgba(39,174,96,0.15);
    border: 1px solid rgba(39,174,96,0.4);
    color: #2ECC71;
    display: flex;
  }

  .auth-message.error {
    background: rgba(231,76,60,0.15);
    border: 1px solid rgba(231,76,60,0.4);
    color: #E74C3C;
    display: flex;
  }

  @media (max-width: 500px) {
    .auth-box { padding: 32px 24px; }
  }
</style>
</head>
<body>

<div class="auth-container">
  <div class="auth-logo">
    <span class="auth-logo-icon">🍛</span>
    <span class="auth-logo-name">Maila Dai Ko Mitho Biriyani</span>
  </div>

  <div class="auth-box">
    <h1 class="auth-title">Welcome Back!</h1>
    <p class="auth-subtitle">Don't have an account? <a href="signup.html"><span>Sign Up Free</span></a></p>

    <div class="auth-message" id="authMsg"></div>

    <div class="input-group">
      <label class="input-label">Email Address</label>
      <div class="input-wrap">
        <i class="fas fa-envelope"></i>
        <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="input-error" id="emailErr">Please enter a valid email address.</div>
    </div>

    <div class="input-group">
      <label class="input-label">Password</label>
      <div class="input-wrap">
        <i class="fas fa-lock"></i>
        <input type="password" id="loginPass" placeholder="Your password" autocomplete="current-password">
        <i class="fas fa-eye" id="togglePass" onclick="togglePwd('loginPass','togglePass')"></i>
      </div>
      <div class="input-error" id="passErr">Password must be at least 6 characters.</div>
    </div>

    <div class="forgot-link"><a href="#">Forgot Password?</a></div>

    <button class="auth-btn" onclick="handleLogin()">
      <i class="fas fa-sign-in-alt"></i> Login to Account
    </button>

    <div class="divider"><span>or continue with</span></div>

    <button class="google-btn" onclick="showMsg('info','Google login coming soon!')">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>

    <div class="auth-switch">
      New here? <a href="signup.html">Create a free account →</a>
    </div>
  </div>

  <a href="index.html" class="back-home">
    <i class="fas fa-arrow-left"></i> Back to Homepage
  </a>
</div>

<script>
  function togglePwd(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon = document.getElementById(iconId);
    if (input.type === 'password') {
      input.type = 'text';
      icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
      input.type = 'password';
      icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
  }

  function showMsg(type, text) {
    const el = document.getElementById('authMsg');
    el.className = 'auth-message ' + type;
    el.innerHTML = (type === 'success' ? '✅ ' : type === 'error' ? '❌ ' : 'ℹ️ ') + text;
    el.style.display = 'flex';
    setTimeout(() => el.style.display = 'none', 5000);
  }

  function handleLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPass').value;
    const emailErr = document.getElementById('emailErr');
    const passErr = document.getElementById('passErr');
    let valid = true;

    // Validate email
    const emailReg = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailReg.test(email)) {
      emailErr.classList.add('show');
      valid = false;
    } else {
      emailErr.classList.remove('show');
    }

    // Validate password
    if (pass.length < 6) {
      passErr.classList.add('show');
      valid = false;
    } else {
      passErr.classList.remove('show');
    }

    if (!valid) return;

    // Check against saved users in localStorage
    const users = JSON.parse(localStorage.getItem('biriyaniUsers') || '[]');
    const found = users.find(u => u.email === email && u.password === pass);

    if (found) {
      localStorage.setItem('loggedInUser', JSON.stringify(found));
      showMsg('success', `Welcome back, ${found.name}! Redirecting...`);
      setTimeout(() => window.location.href = 'index.html', 1800);
    } else {
      showMsg('error', 'Invalid email or password. Please try again or Sign Up.');
    }
  }

  // Allow Enter key
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });
</script>
</body>
</html>
